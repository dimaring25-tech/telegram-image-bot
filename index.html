<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Image Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .prompt-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--tg-theme-button-color, #667eea);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f7f7f7);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            resize: vertical;
            margin-bottom: 20px;
        }
        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .example-btn {
            padding: 8px 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .example-btn:hover {
            background: var(--tg-theme-button-color, #667eea);
            color: white;
        }
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: var(--tg-theme-button-color, #667eea);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result { display: none; margin-top: 20px; }
        .result img { width: 100%; border-radius: 12px; margin-bottom: 10px; }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #667eea);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 AI Image Generator</h1>
            <p>Создавайте изображения с помощью нейросети</p>
        </div>
        
        <textarea id="prompt" class="prompt-input" rows="3" placeholder="Опишите что вы хотите увидеть на английском...&#10;&#10;Example: a cute dog in a park, realistic style"></textarea>
        
        <div class="examples">
            <button class="example-btn" data-prompt="a cute dog playing in a sunny park, realistic">🐕 Dog</button>
            <button class="example-btn" data-prompt="a cat in space wearing a spacesuit, stars">🐱 Cat in space</button>
            <button class="example-btn" data-prompt="beautiful sunset over tropical beach, palm trees">🌅 Sunset</button>
            <button class="example-btn" data-prompt="cyberpunk city at night, neon lights">🌃 Cyberpunk</button>
        </div>
        
        <button id="generateBtn" class="generate-btn">🚀 Generate Image</button>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Generating image...</p>
            <p style="font-size: 12px;">This takes 20-30 seconds</p>
        </div>
        
        <div id="result" class="result">
            <img id="resultImage" alt="Generated image">
            <div id="resultInfo" class="result-info"></div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const API_URL = 'https://mashed-reforest-boxcar.ngrok-free.dev';
        
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const resultImage = document.getElementById('resultImage');
        const resultInfo = document.getElementById('resultInfo');
        
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                promptInput.value = btn.dataset.prompt;
            });
        });
        
        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                tg.showAlert('Please enter a prompt');
                return;
            }
            
            generateBtn.disabled = true;
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            
            try {
                const response = await fetch(API_URL + '/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        user_id: tg.initDataUnsafe?.user?.id || 'anonymous'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadingDiv.style.display = 'none';
                    resultImage.src = 'data:image/png;base64,' + data.image;
                    resultInfo.textContent = `✅ Ready in ${data.time} seconds`;
                    resultDiv.style.display = 'block';
                    tg.showPopup({
                        title: 'Done!',
                        message: 'Image generated successfully',
                        buttons: [{type: 'ok'}]
                    });
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                loadingDiv.style.display = 'none';
                tg.showAlert(`Error: ${error.message}`);
            } finally {
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
