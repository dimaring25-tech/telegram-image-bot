<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Image Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .prompt-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f7f7f7);
            font-size: 16px;
            margin-bottom: 20px;
        }
        .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .example-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .example-btn:hover { background: #667eea; color: white; }
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .generate-btn:disabled { opacity: 0.6; }
        .result { display: none; margin-top: 20px; }
        .result img { width: 100%; border-radius: 12px; }
        .loading { display: none; text-align: center; padding: 40px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { display: none; background: #ff4444; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 AI Image Generator</h1>
            <p>Создавайте изображения с помощью нейросети</p>
        </div>
        
        <div id="status" class="status">🔄 Проверка подключения...</div>
        <div id="errorMsg" class="error"></div>
        
        <textarea id="prompt" class="prompt-input" rows="3" placeholder="Опишите изображение на АНГЛИЙСКОМ...&#10;&#10;Example: a cute dog in a park"></textarea>
        
        <div class="examples">
            <button class="example-btn" data-prompt="a cute dog playing in a sunny park, realistic">🐕 Собака</button>
            <button class="example-btn" data-prompt="a cat in space wearing a spacesuit, stars">🐱 Кот в космосе</button>
            <button class="example-btn" data-prompt="beautiful sunset over tropical beach">🌅 Закат</button>
            <button class="example-btn" data-prompt="cyberpunk city at night, neon lights">🌃 Киберпанк</button>
        </div>
        
        <button id="generateBtn" class="generate-btn">🚀 Сгенерировать</button>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Генерация изображения...</p>
            <p style="font-size: 12px;">20-30 секунд</p>
        </div>
        
        <div id="result" class="result">
            <img id="resultImage" alt="Generated image">
            <div id="resultInfo" class="result-info"></div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const API_URL = 'https://mashed-reforest-boxcar.ngrok-free.dev';
        
        const statusDiv = document.getElementById('status');
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const resultImage = document.getElementById('resultImage');
        const resultInfo = document.getElementById('resultInfo');
        const errorMsg = document.getElementById('errorMsg');
        
        async function checkConnection() {
            try {
                statusDiv.innerHTML = '🔄 Проверка подключения...';
                const response = await fetch(API_URL + '/health', {
                    method: 'GET',
                    signal: AbortSignal.timeout(10000)
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '✅ Сервер подключен! Можно генерировать';
                    statusDiv.style.background = '#4caf50';
                    statusDiv.style.color = 'white';
                    generateBtn.disabled = false;
                } else {
                    throw new Error('Сервер не отвечает');
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ Нет подключения к серверу. Убедитесь что Colab запущен.';
                statusDiv.style.background = '#ff4444';
                statusDiv.style.color = 'white';
                generateBtn.disabled = true;
            }
        }
        
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                promptInput.value = btn.dataset.prompt;
            });
        });
        
        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                tg.showAlert('Введите описание');
                return;
            }
            
            generateBtn.disabled = true;
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch(API_URL + '/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt }),
                    signal: AbortSignal.timeout(90000)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadingDiv.style.display = 'none';
                    resultImage.src = 'data:image/png;base64,' + data.image;
                    resultInfo.textContent = `✅ Готово за ${data.time} секунд`;
                    resultDiv.style.display = 'block';
                    tg.showPopup({
                        title: 'Готово!',
                        message: 'Изображение создано',
                        buttons: [{type: 'ok'}]
                    });
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                loadingDiv.style.display = 'none';
                errorMsg.innerHTML = `❌ Ошибка: ${error.message}`;
                errorMsg.style.display = 'block';
                tg.showAlert(`Ошибка: ${error.message}`);
            } finally {
                generateBtn.disabled = false;
            }
        });
        
        checkConnection();
    </script>
</body>
</html>
