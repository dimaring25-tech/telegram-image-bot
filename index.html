<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Image Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .prompt-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--tg-theme-button-color, #667eea);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f7f7f7);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            resize: vertical;
            margin-bottom: 20px;
            font-family: inherit;
        }
        
        .prompt-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .example-btn {
            padding: 8px 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        
        .generate-btn:active {
            transform: scale(0.98);
        }
        
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            display: none;
            margin-top: 20px;
        }
        
        .result img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .result-info {
            text-align: center;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            display: none;
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .api-url-status {
            font-size: 12px;
            text-align: center;
            margin-bottom: 10px;
            padding: 5px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 8px;
        }
        
        .info-text {
            text-align: center;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 AI Image Generator</h1>
            <p>Создавайте изображения с помощью нейросети</p>
        </div>
        
        <div id="apiStatus" class="api-url-status">🔌 Проверка подключения...</div>
        <div id="errorMsg" class="error"></div>
        
        <textarea id="prompt" class="prompt-input" rows="3" placeholder="Опишите изображение на АНГЛИЙСКОМ...&#10;&#10;Example: a cute dog in a park, realistic style, high quality"></textarea>
        
        <div class="examples">
            <button class="example-btn" data-prompt="a cute dog playing in a sunny park, realistic">🐕 Собака</button>
            <button class="example-btn" data-prompt="a cat in space wearing a spacesuit, stars background">🐱 Кот в космосе</button>
            <button class="example-btn" data-prompt="beautiful sunset over tropical beach, palm trees, ocean">🌅 Закат</button>
            <button class="example-btn" data-prompt="cyberpunk city at night, neon lights, futuristic">🌃 Киберпанк</button>
        </div>
        
        <button id="generateBtn" class="generate-btn" disabled>🚀 Сгенерировать</button>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>🎨 Генерация изображения...</p>
            <p style="font-size: 12px;">Обычно это занимает 20-30 секунд</p>
        </div>
        
        <div id="result" class="result">
            <img id="resultImage" alt="Generated image">
            <div id="resultInfo" class="result-info"></div>
        </div>
        
        <div class="info-text">
            💡 Совет: Чем подробнее описание, тем лучше результат!<br>
            📝 Используйте английский язык для лучшего качества
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ВАШ API URL - скопируйте из Colab (ячейка 5.5)
        const API_URL = 'https://mashed-reforest-boxcar.ngrok-free.dev';
        
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const resultImage = document.getElementById('resultImage');
        const resultInfo = document.getElementById('resultInfo');
        const apiStatus = document.getElementById('apiStatus');
        const errorMsg = document.getElementById('errorMsg');
        
        // Проверка подключения к серверу
        async function checkConnection() {
            try {
                console.log('Проверка подключения к:', API_URL);
                const response = await fetch(API_URL + '/health', {
                    method: 'GET',
                    signal: AbortSignal.timeout(5000)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    apiStatus.innerHTML = '✅ Сервер подключен';
                    apiStatus.style.background = '#4caf50';
                    apiStatus.style.color = 'white';
                    generateBtn.disabled = false;
                } else {
                    throw new Error('Сервер не отвечает');
                }
            } catch (error) {
                console.error('Ошибка подключения:', error);
                apiStatus.innerHTML = '❌ Нет подключения к серверу';
                apiStatus.style.background = '#ff4444';
                apiStatus.style.color = 'white';
                generateBtn.disabled = true;
            }
        }
        
        // Примеры промптов
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                promptInput.value = btn.dataset.prompt;
            });
        });
        
        // Генерация изображения
        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                tg.showAlert('Пожалуйста, введите описание');
                return;
            }
            
            generateBtn.disabled = true;
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            errorMsg.style.display = 'none';
            
            try {
                console.log('Отправка запроса:', prompt);
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000);
                
                const response = await fetch(API_URL + '/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        user_id: tg.initDataUnsafe?.user?.id || 'anonymous'
                    }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    loadingDiv.style.display = 'none';
                    resultImage.src = 'data:image/png;base64,' + data.image;
                    resultInfo.textContent = `✅ Готово за ${data.time} секунд`;
                    resultDiv.style.display = 'block';
                    
                    tg.showPopup({
                        title: 'Готово!',
                        message: 'Изображение создано',
                        buttons: [{type: 'ok'}]
                    });
                } else {
                    throw new Error(data.error || 'Неизвестная ошибка');
                }
            } catch (error) {
                loadingDiv.style.display = 'none';
                console.error('Ошибка:', error);
                
                let errorText = error.message;
                if (error.name === 'AbortError') {
                    errorText = 'Сервер не отвечает слишком долго. Проверьте подключение.';
                } else if (error.message.includes('Failed to fetch')) {
                    errorText = 'Не удалось подключиться к серверу. Проверьте API URL.';
                }
                
                errorMsg.innerHTML = `❌ Ошибка: ${errorText}`;
                errorMsg.style.display = 'block';
                tg.showAlert(`Ошибка: ${errorText}`);
            } finally {
                generateBtn.disabled = false;
            }
        });
        
        // Запускаем проверку подключения
        checkConnection();
    </script>
</body>
</html>
