<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }
        .loading { text-align: center; padding: 40px; display: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result { margin-top: 20px; display: none; }
        .result img { width: 100%; border-radius: 12px; }
        .error { background: #ff4444; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .examples { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .example {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎨 AI Image Generator</h1>
        <p>Создавайте изображения по тексту</p>
    </div>
    
    <div class="examples">
        <div class="example" data-prompt="a cute dog in a park, realistic">🐕 Собака</div>
        <div class="example" data-prompt="a cat in space, stars background">🐱 Кот в космосе</div>
        <div class="example" data-prompt="beautiful sunset over ocean">🌅 Закат</div>
        <div class="example" data-prompt="cyberpunk city at night, neon lights">🌃 Киберпанк</div>
    </div>
    
    <textarea id="prompt" rows="3" placeholder="Describe image in English...&#10;Example: a cute dog in a park"></textarea>
    
    <button id="generate">🚀 Generate Image</button>
    
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Generating... 20-30 seconds</p>
    </div>
    
    <div id="error" class="error"></div>
    
    <div id="result" class="result">
        <img id="image" alt="Generated">
        <p id="info"></p>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ⚠️ ВСТАВЬТЕ ВАШ API URL ИЗ COLAB ⚠️
        const API_URL = 'https://ваш-адрес.ngrok-free.dev';
        
        document.querySelectorAll('.example').forEach(el => {
            el.onclick = () => {
                document.getElementById('prompt').value = el.dataset.prompt;
            };
        });
        
        document.getElementById('generate').onclick = async () => {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                tg.showAlert('Enter prompt');
                return;
            }
            
            const btn = document.getElementById('generate');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            btn.disabled = true;
            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch(API_URL + '/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: prompt})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loading.style.display = 'none';
                    document.getElementById('image').src = 'data:image/png;base64,' + data.image;
                    document.getElementById('info').innerText = '✅ Ready in ' + data.time + ' seconds';
                    resultDiv.style.display = 'block';
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                loading.style.display = 'none';
                errorDiv.innerText = '❌ Error: ' + err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
